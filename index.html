<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tahsan Design – Coming Soon</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #6b8e3e;
      --blue: #2c4a8c;
      --off-white: #f5f5f3;
      --dark: #1a1a1a;
    }
    html, body {
      height: 100%;
      font-family: 'Open Sans', sans-serif;
      background: var(--dark);
      color: var(--off-white);
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(107,142,62,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 30%, rgba(44,74,140,0.18) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .logo-wrap {
      margin-bottom: 44px;
      animation: fadeDown 0.8s ease both;
    }
    .logo-wrap img {
      max-width: min(480px, 90vw);
      height: auto;
      display: block;
      border-radius: 6px;
    }
    .headline {
      text-align: center;
      margin-bottom: 16px;
      animation: fadeUp 0.9s 0.2s ease both;
    }
    .headline h1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: clamp(32px, 8vw, 72px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--off-white);
    }
    .headline h1 span {
      background: linear-gradient(90deg, var(--green), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subline {
      margin-top: 14px;
      font-size: clamp(13px, 2vw, 16px);
      font-weight: 300;
      color: rgba(245,245,243,0.6);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      animation: fadeUp 0.9s 0.35s ease both;
    }
    .tagline {
      font-family: 'Open Sans', sans-serif;
      font-style: italic;
      font-size: clamp(14px, 2vw, 17px);
      color: rgba(245,245,243,0.5);
      margin: 28px 0 44px;
      text-align: center;
      animation: fadeUp 0.9s 0.45s ease both;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--green), var(--blue));
      border-radius: 1px;
      margin: 0 auto 44px;
      animation: fadeUp 0.9s 0.45s ease both;
    }
    .contact {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 32px;
      justify-content: center;
      margin-bottom: 48px;
      animation: fadeUp 0.9s 0.55s ease both;
    }
    .contact a {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--off-white);
      font-size: clamp(13px, 1.8vw, 15px);
      font-weight: 600;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 10px 20px;
      transition: background 0.2s, border-color 0.2s;
    }
    .contact a:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.25);
    }
    .contact a .icon { width: 18px; height: 18px; flex-shrink: 0; }
    .services {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.9s 0.65s ease both;
    }
    .services p {
      font-size: clamp(12px, 1.6vw, 14px);
      color: rgba(245,245,243,0.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .service-tags { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .tag {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(245,245,243,0.55);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 5px 12px;
    }
    footer {
      font-size: 11px;
      color: rgba(245,245,243,0.25);
      letter-spacing: 0.06em;
      text-align: center;
      animation: fadeUp 0.9s 0.75s ease both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
